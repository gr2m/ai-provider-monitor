- change: changed
  target: request
  breaking: false
  deprecated: false
  doc_only: true
  note: '''end'' query parameter clarified as exclusive; description and example updated'
  paths:
    - path: parameters[4].description
      before: End date in ISO8601 format (e.g., '2025-01-31T23:59:59Z' or '2025-01-31'). Defaults to current time.
      after: End date in ISO8601 format, exclusive (e.g., '2025-02-01T00:00:00Z' or '2025-02-01'). Data up to but not including this timestamp is returned. Defaults to current time.
    - path: parameters[4].schema.description
      before: End date in ISO8601 format (e.g., '2025-01-31T23:59:59Z' or '2025-01-31'). Defaults to current time.
      after: End date in ISO8601 format, exclusive (e.g., '2025-02-01T00:00:00Z' or '2025-02-01'). Data up to but not including this timestamp is returned. Defaults to current time.
    - path: parameters[4].schema.example
      before: '2025-01-31T23:59:59Z'
      after: '2025-02-01T00:00:00Z'
  date: '2026-03-16'
  diff_url: https://github.com/gr2m/ai-provider-monitor/pull/787
- change: changed
  target: request
  breaking: false
  deprecated: false
  doc_only: false
  note: endpoint_id now accepts multiple IDs (string or array, up to 50); added form style/explode; descriptions/examples updated
  paths:
    - path: $.parameters[?(@.name=="endpoint_id")].schema
      before: '{"description":"Endpoint identifier to filter requests by","example":"fal-ai/flux/dev","type":"string"}'
      after: '{"anyOf":[{"type":"string"},{"items":{"type":"string"},"type":"array"}],"description":"Filter by specific endpoint ID(s). Accepts 1-50 endpoint IDs. Supports comma-separated values: ?endpoint_id=model1,model2 or array syntax: ?endpoint_id=model1&endpoint_id=model2","example":["fal-ai/flux/dev"]}'
    - path: $.parameters[?(@.name=="endpoint_id")].explode
      before: 'null'
      after: 'true'
    - path: $.parameters[?(@.name=="endpoint_id")].style
      before: 'null'
      after: form
    - path: $.parameters[?(@.name=="endpoint_id")].description
      before: Endpoint identifier to filter requests by
      after: 'Filter by specific endpoint ID(s). Accepts 1-50 endpoint IDs. Supports comma-separated values: ?endpoint_id=model1,model2 or array syntax: ?endpoint_id=model1&endpoint_id=model2'
    - path: $.parameters[?(@.name=="endpoint_id")].schema.example
      before: '"fal-ai/flux/dev"'
      after: '["fal-ai/flux/dev"]'
  date: '2026-03-31'
- change: changed
  target: route
  breaking: false
  deprecated: false
  doc_only: true
  note: Route description updated to clarify multi-endpoint support and ID limits
  paths:
    - path: $.description
      before: |-
        Lists requests for a specific endpoint.

        **Authentication:** Requires API key (user or enterprise).

        **Filters:**
        - Time range via start / end
        - Status (success, error, user_error)
        - Request ID
        - Pagination via cursor/limit (limit defaults to 50, max 100)

        **Sorting:**
        - By end time (default) or duration

        **Expansions:**
        - Include payloads by adding expand=payloads
      after: |-
        Lists requests for one or more endpoints (same `endpoint_id` style as usage/explore:
        comma-separated or repeated query params, up to 50 IDs).

        **Authentication:** Requires API key (user or enterprise).

        **Filters:**
        - Time range via start / end
        - Status (success, error, user_error)
        - Request ID
        - Pagination via cursor/limit (limit defaults to 50, max 100)

        **Sorting:**
        - By end time (default) or duration

        **Expansions:**
        - Include payloads by adding expand=payloads
  date: '2026-03-31'
- change: changed
  target: route
  breaking: false
  deprecated: false
  doc_only: true
  note: Summary updated to reflect multi-endpoint support
  paths:
    - path: $.summary
      before: List requests by endpoint
      after: List requests by endpoint(s)
  date: '2026-03-31'
