- change: added
  target: response
  breaking: false
  deprecated: false
  doc_only: false
  note: Added optional enterprise_status field to each model (expandable) with values 'ready'|'pending' or an error object.
  paths:
    - path: responses.200.content.application/json.schema.properties.models.items.properties.enterprise_status
      before: 'null'
      after: 'anyOf: ''ready''|''pending'' OR { error: { code, message } }'
  date: '2026-03-05'
- change: changed
  target: request
  breaking: false
  deprecated: false
  doc_only: true
  note: Updated expand parameter docs to include new 'enterprise_status' expansion option.
  paths:
    - path: parameters[name=expand].schema.description
      before: 'Fields to expand in the response. Supported values: ''openapi-3.0'' (includes full OpenAPI 3.0 schema in ''openapi'' field)'
      after: 'Fields to expand in the response. Supported values: ''openapi-3.0'' (includes full OpenAPI 3.0 schema in ''openapi'' field), ''enterprise_status'' (includes enterprise readiness status)'
  date: '2026-03-05'
- change: changed
  target: route
  breaking: false
  deprecated: false
  doc_only: true
  note: Route description updated to document new expand option 'enterprise_status' and clarify expand usage.
  paths:
    - path: description
      before: Use `expand=openapi-3.0` to include the full OpenAPI 3.0 schema inline in the 'openapi' field for each model.
      after: 'Use `expand` to include additional data in each model object: - `openapi-3.0` — full OpenAPI 3.0 schema in the `openapi` field - `enterprise_status` — enterprise readiness status (`ready` or `pending`) in the `enterprise_status` field'
  date: '2026-03-05'
