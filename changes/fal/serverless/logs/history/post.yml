- change: changed
  target: request
  breaking: false
  deprecated: false
  doc_only: true
  note: '''end'' query parameter description updated to clarify it is exclusive (data returned is before this timestamp).'
  paths:
    - path: $.parameters[3].description
      before: End date in ISO8601 format (e.g., '2025-01-31T23:59:59Z' or '2025-01-31'). Defaults to current time.
      after: End date in ISO8601 format, exclusive (e.g., '2025-02-01T00:00:00Z' or '2025-02-01'). Data up to but not including this timestamp is returned. Defaults to current time.
    - path: $.parameters[3].schema.description
      before: End date in ISO8601 format (e.g., '2025-01-31T23:59:59Z' or '2025-01-31'). Defaults to current time.
      after: End date in ISO8601 format, exclusive (e.g., '2025-02-01T00:00:00Z' or '2025-02-01'). Data up to but not including this timestamp is returned. Defaults to current time.
  date: '2026-03-16'
