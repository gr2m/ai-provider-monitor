- change: changed
  target: request
  breaking: false
  deprecated: false
  doc_only: true
  note: End query parameter documentation clarified as exclusive; example updated.
  paths:
    - path: parameters[4].description
      before: End date in ISO8601 format (e.g., '2025-01-31T23:59:59Z' or '2025-01-31'). Defaults to current time.
      after: End date in ISO8601 format, exclusive (e.g., '2025-02-01T00:00:00Z' or '2025-02-01'). Data up to but not including this timestamp is returned. Defaults to current time.
    - path: parameters[4].schema.description
      before: End date in ISO8601 format (e.g., '2025-01-31T23:59:59Z' or '2025-01-31'). Defaults to current time.
      after: End date in ISO8601 format, exclusive (e.g., '2025-02-01T00:00:00Z' or '2025-02-01'). Data up to but not including this timestamp is returned. Defaults to current time.
    - path: parameters[4].schema.example
      before: '2025-01-31T23:59:59Z'
      after: '2025-02-01T00:00:00Z'
  date: '2026-03-16'
  diff_url: https://github.com/gr2m/ai-provider-monitor/pull/787
- change: changed
  target: request
  breaking: false
  deprecated: false
  doc_only: false
  note: endpoint_id now accepts multiple values (string or array); supports comma-separated or repeated params; added explode=true and style=form.
  paths:
    - path: parameters[name=endpoint_id].schema
      before: '{"description":"Endpoint identifier to filter requests by","example":"fal-ai/flux/dev","type":"string"}'
      after: '{"anyOf":[{"type":"string"},{"items":{"type":"string"},"type":"array"}],"description":"Filter by specific endpoint ID(s). Accepts 1-50 endpoint IDs. Supports comma-separated values: ?endpoint_id=model1,model2 or array syntax: ?endpoint_id=model1&endpoint_id=model2","example":["fal-ai/flux/dev"]}'
    - path: parameters[name=endpoint_id].explode
      before: 'null'
      after: 'true'
    - path: parameters[name=endpoint_id].style
      before: 'null'
      after: form
  date: '2026-03-31'
  diff_url: https://github.com/gr2m/ai-provider-monitor/pull/853
