  doc_only: false
  note: Introduces POST /v1/vaults/{vault_id}/credentials?beta=true to create a credential in a vault. Accepts auth config (static_bearer or mcp_oauth with optional refresh), plus optional display_name and metadata; returns a vault_credential without sensitive fields. Supports anthropic-version and anthropic-beta headers; standard error responses on failure.
