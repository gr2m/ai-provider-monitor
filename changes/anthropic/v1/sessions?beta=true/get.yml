  note: Introduces a beta GET /v1/sessions endpoint to list Managed Agents sessions with pagination and rich filters. Supports limit, cursor pagination via page/next_page, include_archived (default false), created_at time range filters (gte/gt/lte/lt, RFC 3339), agent_id and agent_version filtering, and order by created_at (asc|desc, default desc). Returns a paginated data array of session objects plus next_page; standard error responses included.
