  note: Adds GET /v1/sessions/{session_id}/events/stream?beta=true to stream managed agent session events in real time. Emits typed events for user/agent messages, tool use/results (custom, MCP, built-in), thinking, session status changes, model request spans with usage, errors, and session.deleted. Accepts session_id path param and optional headers x-api-key, anthropic-version, and anthropic-beta.
