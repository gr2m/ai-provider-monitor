- change: added
  target: route
  breaking: false
  deprecated: false
  doc_only: false
  note: Introduces beta endpoint POST /v1/sessions/{session_id}/events to send events to a Managed Agents session (user.message, user.interrupt, user.tool_confirmation, user.custom_tool_result). Accepts JSON body with events array and returns the sent events. Supports optional anthropic-version and anthropic-beta headers; includes standard error responses.
  paths: []
  date: '2026-04-08'
  diff_url: https://github.com/gr2m/ai-provider-monitor/pull/879
