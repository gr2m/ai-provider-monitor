- change: added
  target: route
  breaking: false
  deprecated: false
  doc_only: false
  note: Introduces beta GET /v1/models/{model_id}?beta=true to retrieve details for a specific model or resolve a model alias; returns ModelInfo (id, display_name, created_at, type) and supports anthropic-version, x-api-key, anthropic-beta headers with standard 4XX error types.
  paths: []
  date: '2026-02-20'
  diff_url: https://github.com/gr2m/ai-provider-api-changes/pull/574
- change: removed
  target: route
  breaking: true
  deprecated: false
  doc_only: false
  note: Beta endpoint to fetch details for a specific model and resolve aliases to model IDs was removed.
  paths: []
  date: '2026-02-20'
  diff_url: https://github.com/gr2m/ai-provider-api-changes/pull/574
- change: added
  target: response
  breaking: false
  deprecated: false
  doc_only: false
  note: Added capabilities field to ModelInfo (nullable) describing model capability support.
  paths:
    - path: components.schemas.BetaModelInfo.properties.capabilities
      before: 'null'
      after: '{"anyOf":[{"$ref":"#/components/schemas/BetaModelCapabilities"},{"type":"null"}],"description":"Object mapping capability names to their support details. Keys are always present for all known capabilities."}'
  date: '2026-03-18'
- change: added
  target: response
  breaking: false
  deprecated: false
  doc_only: false
  note: Added max_input_tokens to ModelInfo (nullable integer).
  paths:
    - path: components.schemas.BetaModelInfo.properties.max_input_tokens
      before: 'null'
      after: '{"anyOf":[{"type":"integer"},{"type":"null"}],"description":"Maximum input context window size in tokens for this model.","title":"Max Input Tokens"}'
  date: '2026-03-18'
- change: added
  target: response
  breaking: false
  deprecated: false
  doc_only: false
  note: Added max_tokens to ModelInfo (nullable integer).
  paths:
    - path: components.schemas.BetaModelInfo.properties.max_tokens
      before: 'null'
      after: '{"anyOf":[{"type":"integer"},{"type":"null"}],"description":"Maximum value for the `max_tokens` parameter when using this model.","title":"Max Tokens"}'
  date: '2026-03-18'
- change: changed
  target: response
  breaking: false
  deprecated: false
  doc_only: false
  note: Updated ModelInfo required fields to include capabilities, max_input_tokens, and max_tokens.
  paths:
    - path: components.schemas.BetaModelInfo.required
      before: '["created_at","display_name","id","type"]'
      after: '["capabilities","created_at","display_name","id","max_input_tokens","max_tokens","type"]'
  date: '2026-03-18'
- change: added
  target: response
  breaking: false
  deprecated: false
  doc_only: false
  note: Introduced new capability detail schemas referenced by ModelInfo.capabilities.
  paths:
    - path: components.schemas.BetaModelCapabilities
      before: 'null'
      after: '{"description":"Model capability information.","properties":{"batch":{"$ref":"#/components/schemas/BetaCapabilitySupport","description":"Whether the model supports the Batch API."},"citations":{"$ref":"#/components/schemas/BetaCapabilitySupport","description":"Whether the model supports citation generation."},"code_execution":{"$ref":"#/components/schemas/BetaCapabilitySupport","description":"Whether the model supports code execution tools."},"context_management":{"$ref":"#/components/schemas/BetaContextManagementCapability","description":"Context management support and available strategies."},"effort":{"$ref":"#/components/schemas/BetaEffortCapability","description":"Effort (reasoning_effort) support and available levels."},"image_input":{"$ref":"#/components/schemas/BetaCapabilitySupport","description":"Whether the model accepts image content blocks."},"pdf_input":{"$ref":"#/components/schemas/BetaCapabilitySupport","description":"Whether the model accepts PDF content blocks."},"structured_outputs":{"$ref":"#/components/schemas/BetaCapabilitySupport","description":"Whether the model supports structured output / JSON mode / strict tool schemas."},"thinking":{"$ref":"#/components/schemas/BetaThinkingCapability","description":"Thinking capability and supported type configurations."}},"required":["batch","citations","code_execution","context_management","effort","image_input","pdf_input","structured_outputs","thinking"],"title":"ModelCapabilities","type":"object"}'
    - path: components.schemas.BetaCapabilitySupport
      before: 'null'
      after: '{"description":"Indicates whether a capability is supported.","properties":{"supported":{"description":"Whether this capability is supported by the model.","title":"Supported","type":"boolean"}},"required":["supported"],"title":"CapabilitySupport","type":"object"}'
    - path: components.schemas.BetaContextManagementCapability
      before: 'null'
      after: '{"description":"Context management capability details.","properties":{"clear_thinking_20251015":{"anyOf":[{"$ref":"#/components/schemas/BetaCapabilitySupport"},{"type":"null"}],"description":"Whether the clear_thinking_20251015 strategy is supported."},"clear_tool_uses_20250919":{"anyOf":[{"$ref":"#/components/schemas/BetaCapabilitySupport"},{"type":"null"}],"description":"Whether the clear_tool_uses_20250919 strategy is supported."},"compact_20260112":{"anyOf":[{"$ref":"#/components/schemas/BetaCapabilitySupport"},{"type":"null"}],"description":"Whether the compact_20260112 strategy is supported."},"supported":{"description":"Whether this capability is supported by the model.","title":"Supported","type":"boolean"}},"required":["clear_thinking_20251015","clear_tool_uses_20250919","compact_20260112","supported"],"title":"ContextManagementCapability","type":"object"}'
    - path: components.schemas.BetaEffortCapability
      before: 'null'
      after: '{"description":"Effort (reasoning_effort) capability details.","properties":{"high":{"$ref":"#/components/schemas/BetaCapabilitySupport","description":"Whether the model supports high effort level."},"low":{"$ref":"#/components/schemas/BetaCapabilitySupport","description":"Whether the model supports low effort level."},"max":{"$ref":"#/components/schemas/BetaCapabilitySupport","description":"Whether the model supports max effort level."},"medium":{"$ref":"#/components/schemas/BetaCapabilitySupport","description":"Whether the model supports medium effort level."},"supported":{"description":"Whether this capability is supported by the model.","title":"Supported","type":"boolean"}},"required":["high","low","max","medium","supported"],"title":"EffortCapability","type":"object"}'
    - path: components.schemas.BetaThinkingCapability
      before: 'null'
      after: '{"description":"Thinking capability details.","properties":{"supported":{"description":"Whether this capability is supported by the model.","title":"Supported","type":"boolean"},"types":{"$ref":"#/components/schemas/BetaThinkingTypes"}},"required":["supported","types"],"title":"ThinkingCapability","type":"object"}'
    - path: components.schemas.BetaThinkingTypes
      before: 'null'
      after: '{"description":"Supported thinking type configurations.","properties":{"adaptive":{"$ref":"#/components/schemas/BetaCapabilitySupport","description":"Whether the model supports thinking with type ''adaptive'' (auto)."},"enabled":{"$ref":"#/components/schemas/BetaCapabilitySupport","description":"Whether the model supports thinking with type ''enabled''."}},"required":["adaptive","enabled"],"title":"ThinkingTypes","type":"object"}'
  date: '2026-03-18'
