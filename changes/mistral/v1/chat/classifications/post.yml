- change: added
  target: request
  breaking: false
  deprecated: false
  doc_only: false
  note: SystemMessage content arrays now support a new 'thinking' chunk and use a discriminator over oneOf(TextChunk, ThinkChunk).
  paths:
    - path: requestBody.content.application/json.schema.properties.input.anyOf[0].properties.messages.items.oneOf[0].properties.content.anyOf[1].items
      before: array items = TextChunk only
      after: array items = oneOf(TextChunk, ThinkChunk) with discriminator type
    - path: requestBody.content.application/json.schema.properties.input.anyOf[1].items.properties.messages.items.oneOf[0].properties.content.anyOf[1].items
      before: array items = TextChunk only
      after: array items = oneOf(TextChunk, ThinkChunk) with discriminator type
  date: '2026-02-20'
  diff_url: https://github.com/gr2m/ai-provider-api-changes/pull/575
