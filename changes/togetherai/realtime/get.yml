- change: changed
  target: request
  breaking: false
  deprecated: false
  doc_only: true
  note: 'Clarified input_audio_buffer.commit behavior: with VAD enabled, server auto-detects segments; with VAD disabled, client must send commit to trigger transcription.'
  paths:
    - path: $.description.client_events.input_audio_buffer.commit
      before: |-
        - `input_audio_buffer.commit`: Signal end of audio stream
        {
          "type": "input_audio_buffer.commit"
        }
      after: |-
        - `input_audio_buffer.commit`: Signal end of audio stream. When VAD is enabled, the server automatically detects speech boundaries and emits `completed` events. When VAD is disabled, you must send `commit` to trigger transcription of the buffered audio.
        {
          "type": "input_audio_buffer.commit"
        }
  date: '2026-04-19'
- change: added
  target: request
  breaking: false
  deprecated: false
  doc_only: true
  note: Added client event transcription_session.updated to configure Voice Activity Detection (VAD) during a session or disable it by setting turn_detection to null.
  paths:
    - path: $.description.client_events.transcription_session.updated
      before: 'null'
      after: |-
        - `transcription_session.updated`: Update session configuration, including VAD parameters. Can be sent after `session.created` or anytime during the session.
        {
          "type": "transcription_session.updated",
          "session": {
            "turn_detection": {
              "type": "server_vad",
              "threshold": 0.3,
              "min_silence_duration_ms": 500,
              "min_speech_duration_ms": 250,
              "max_speech_duration_s": 5.0,
              "speech_pad_ms": 250
            }
          }
        }
        To disable VAD:
        {
          "type": "transcription_session.updated",
          "session": { "turn_detection": null }
        }
  date: '2026-04-19'
- change: added
  target: response
  breaking: false
  deprecated: false
  doc_only: true
  note: Added server event transcription_session.updated acknowledging and reflecting applied VAD settings.
  paths:
    - path: $.description.server_events.transcription_session.updated
      before: 'null'
      after: |-
        - `transcription_session.updated`: Confirms session configuration was applied.
        {
          "type": "transcription_session.updated",
          "session": {
            "turn_detection": {
              "type": "server_vad",
              "threshold": 0.3,
              "min_silence_duration_ms": 500,
              "min_speech_duration_ms": 250,
              "max_speech_duration_s": 5.0,
              "speech_pad_ms": 250
            }
          }
        }
  date: '2026-04-19'
- change: added
  target: request
  breaking: false
  deprecated: false
  doc_only: true
  note: Added Voice Activity Detection (VAD) documentation, including defaults, runtime configuration via session message, and optional query parameters (turn_detection, threshold, min_silence_duration_ms, min_speech_duration_ms, max_speech_duration_s, speech_pad_ms).
  paths:
    - path: $.description.sections.vad
      before: 'null'
      after: 'Voice Activity Detection (VAD): Enabled by default using Silero VAD. Configure at connection time via query params (e.g., turn_detection=server_vad&threshold=0.3&min_silence_duration_ms=500) or dynamically via `transcription_session.updated`. Disable at connection time with turn_detection=none or at runtime by setting `turn_detection` to null. Parameters (all optional with defaults): type, threshold, min_silence_duration_ms, min_speech_duration_ms, max_speech_duration_s, speech_pad_ms.'
  date: '2026-04-19'
