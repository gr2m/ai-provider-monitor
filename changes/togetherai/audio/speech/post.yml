- change: changed
  target: request
  breaking: false
  deprecated: false
  doc_only: true
  note: Updated documentation link in voice property description to use the 'supported-voices' anchor.
  paths:
    - path: components.schemas.AudioSpeechRequest.properties.voice.description
      before: |
        The voice to use for generating the audio. The voices supported are different for each model. For eg - for canopylabs/orpheus-3b-0.1-ft, one of the voices supported is tara, for hexgrad/Kokoro-82M, one of the voices supported is af_alloy and for cartesia/sonic, one of the voices supported is "friendly sidekick". <br> <br> You can view the voices supported for each model using the /v1/voices endpoint sending the model name as the query parameter. [View all supported voices here](https://docs.together.ai/docs/text-to-speech#voices-available).
      after: |
        The voice to use for generating the audio. The voices supported are different for each model. For eg - for canopylabs/orpheus-3b-0.1-ft, one of the voices supported is tara, for hexgrad/Kokoro-82M, one of the voices supported is af_alloy and for cartesia/sonic, one of the voices supported is "friendly sidekick". <br> <br> You can view the voices supported for each model using the /v1/voices endpoint sending the model name as the query parameter. [View all supported voices here](https://docs.together.ai/docs/text-to-speech#supported-voices).
  date: '2026-03-25'
  diff_url: https://github.com/gr2m/ai-provider-monitor/pull/828
- change: added
  target: request
  breaking: false
  deprecated: false
  doc_only: false
  note: Added bit_rate to AudioSpeechRequest to control MP3 bitrate (only when response_format=mp3; currently on Cartesia models).
  paths:
    - path: components.schemas.AudioSpeechRequest.properties.bit_rate
      before: 'null'
      after: '{"type":"integer","default":128000,"enum":[32000,64000,96000,128000,192000],"description":"Bitrate of the MP3 audio output in bits per second. Only applicable when response_format is mp3. Higher values produce better audio quality at larger file sizes. Default is 128000. Currently supported on Cartesia models."}'
  date: '2026-03-30'
