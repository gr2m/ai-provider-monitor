- change: changed
  target: request
  breaking: true
  deprecated: false
  doc_only: false
  note: UpdateDeploymentRequest.autoscaling changed from free-form object to a typed oneOf (HTTPAutoscalingConfig | QueueAutoscalingConfig | CustomMetricAutoscalingConfig).
  paths:
    - path: components/schemas/UpdateDeploymentRequest/properties/autoscaling
      before: '{"additionalProperties":{"type":"string"},"description":"Autoscaling configuration as key-value pairs. Example: {\"metric\": \"QueueBacklogPerWorker\", \"target\": \"10\"} to scale based on queue backlog","type":"object"}'
      after: '{"description":"Autoscaling configuration for the deployment. Omit or set to null to disable autoscaling","oneOf":[{"$ref":"#/components/schemas/HTTPAutoscalingConfig"},{"$ref":"#/components/schemas/QueueAutoscalingConfig"},{"$ref":"#/components/schemas/CustomMetricAutoscalingConfig"}]}'
  date: '2026-03-10'
- change: changed
  target: response
  breaking: true
  deprecated: false
  doc_only: false
  note: DeploymentResponseItem.autoscaling changed from free-form object to a typed oneOf (HTTPAutoscalingConfig | QueueAutoscalingConfig | CustomMetricAutoscalingConfig).
  paths:
    - path: components/schemas/DeploymentResponseItem/properties/autoscaling
      before: '{"additionalProperties":{"type":"string"},"description":"Autoscaling contains autoscaling configuration parameters for this deployment","type":"object"}'
      after: '{"description":"Autoscaling contains autoscaling configuration parameters for this deployment. Omitted when autoscaling is disabled (nil)","oneOf":[{"$ref":"#/components/schemas/HTTPAutoscalingConfig"},{"$ref":"#/components/schemas/QueueAutoscalingConfig"},{"$ref":"#/components/schemas/CustomMetricAutoscalingConfig"}]}'
  date: '2026-03-10'
- change: added
  target: request
  breaking: false
  deprecated: false
  doc_only: false
  note: New autoscaling config schemas introduced (used by both request and response).
  paths:
    - path: components/schemas/HTTPAutoscalingConfig
      before: 'null'
      after: '{"description":"Autoscaling config for HTTPTotalRequests and HTTPAvgRequestDuration metrics","properties":{"metric":{"description":"Metric must be HTTPTotalRequests or HTTPAvgRequestDuration","enum":["HTTPTotalRequests","HTTPAvgRequestDuration"],"example":"HTTPTotalRequests","type":"string"},"target":{"description":"Target is the threshold value. Default: 100 for HTTPTotalRequests, 500 (ms) for HTTPAvgRequestDuration","example":100,"type":"number"},"time_interval_minutes":{"description":"TimeIntervalMinutes is the rate window in minutes. Default: 10","example":10,"type":"integer"}},"type":"object"}'
    - path: components/schemas/QueueAutoscalingConfig
      before: 'null'
      after: '{"description":"Autoscaling config for QueueBacklogPerWorker metric","properties":{"metric":{"description":"Metric must be QueueBacklogPerWorker","enum":["QueueBacklogPerWorker"],"example":"QueueBacklogPerWorker","type":"string"},"model":{"description":"Model overrides the model name for queue status lookup. Defaults to the deployment app name","type":"string"},"target":{"description":"Target is the threshold value. Default: 1.01","example":1.01,"type":"number"}},"type":"object"}'
    - path: components/schemas/CustomMetricAutoscalingConfig
      before: 'null'
      after: '{"description":"Autoscaling config for CustomMetric metric","properties":{"custom_metric_name":{"description":"CustomMetricName is the Prometheus metric name. Required. Must match [a-zA-Z_:][a-zA-Z0-9_:]*","example":"my_custom_metric","type":"string"},"metric":{"description":"Metric must be CustomMetric","enum":["CustomMetric"],"example":"CustomMetric","type":"string"},"target":{"description":"Target is the threshold value. Default: 500","example":500,"type":"number"}},"type":"object"}'
  date: '2026-03-10'
