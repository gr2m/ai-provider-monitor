- change: changed
  target: request
  breaking: true
  deprecated: false
  doc_only: false
  note: UpdateDeploymentRequest.autoscaling changed from free-form object to a typed oneOf (HTTPAutoscalingConfig | QueueAutoscalingConfig | CustomMetricAutoscalingConfig).
  paths:
    - path: components/schemas/UpdateDeploymentRequest/properties/autoscaling
      before: '{"additionalProperties":{"type":"string"},"description":"Autoscaling configuration as key-value pairs. Example: {\"metric\": \"QueueBacklogPerWorker\", \"target\": \"10\"} to scale based on queue backlog","type":"object"}'
      after: '{"description":"Autoscaling configuration for the deployment. Omit or set to null to disable autoscaling","oneOf":[{"$ref":"#/components/schemas/HTTPAutoscalingConfig"},{"$ref":"#/components/schemas/QueueAutoscalingConfig"},{"$ref":"#/components/schemas/CustomMetricAutoscalingConfig"}]}'
  date: '2026-03-10'
  diff_url: https://github.com/gr2m/ai-provider-monitor/pull/761
- change: changed
  target: response
  breaking: true
  deprecated: false
  doc_only: false
  note: DeploymentResponseItem.autoscaling changed from free-form object to a typed oneOf (HTTPAutoscalingConfig | QueueAutoscalingConfig | CustomMetricAutoscalingConfig).
  paths:
    - path: components/schemas/DeploymentResponseItem/properties/autoscaling
      before: '{"additionalProperties":{"type":"string"},"description":"Autoscaling contains autoscaling configuration parameters for this deployment","type":"object"}'
      after: '{"description":"Autoscaling contains autoscaling configuration parameters for this deployment. Omitted when autoscaling is disabled (nil)","oneOf":[{"$ref":"#/components/schemas/HTTPAutoscalingConfig"},{"$ref":"#/components/schemas/QueueAutoscalingConfig"},{"$ref":"#/components/schemas/CustomMetricAutoscalingConfig"}]}'
