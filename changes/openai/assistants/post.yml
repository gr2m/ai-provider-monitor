- change: added
  target: route
  breaking: false
  deprecated: true
  doc_only: false
  note: Introduces POST /assistants (deprecated) to create an assistant configured with a model, instructions, optional tools (code_interpreter, file_search, function), tool resources, and generation params (temperature, top_p, response_format, reasoning_effort). Returns the Assistant object with IDs and metadata.
  paths: []
  date: '2026-02-20'
  diff_url: https://github.com/gr2m/ai-provider-api-changes/pull/578
- change: changed
  target: request
  breaking: false
  deprecated: false
  doc_only: false
  note: Increased max files per vector store when creating assistants from 10,000 to 100,000,000.
  paths:
    - path: components.schemas.CreateAssistantRequest.properties.tool_resources.anyOf[0].properties.file_search.properties.vector_stores.items.properties.file_ids.maxItems
      before: '10000'
      after: '100000000'
  date: '2026-03-05'
  diff_url: https://github.com/gr2m/ai-provider-monitor/pull/749
- change: changed
  target: request
  breaking: false
  deprecated: false
  doc_only: true
  note: Updated description of vector store file_ids to reflect new limits and Nov 2025 cutoff.
  paths:
    - path: components.schemas.CreateAssistantRequest.properties.tool_resources.anyOf[0].properties.file_search.properties.vector_stores.items.properties.file_ids.description
      before: |
        A list of [file](/docs/api-reference/files) IDs to add to the vector store. There can be a maximum of 10000 files in a vector store.
      after: |
        A list of [file](/docs/api-reference/files) IDs to add to the vector store. For vector stores created before Nov 2025, there can be a maximum of 10,000 files in a vector store. For vector stores created starting in Nov 2025, the limit is 100,000,000 files.
  date: '2026-03-05'
  diff_url: https://github.com/gr2m/ai-provider-monitor/pull/749
