- change: added
  target: route
  breaking: false
  deprecated: false
  doc_only: false
  note: Adds POST /batches to create and execute a batch job from an uploaded JSONL file of requests (purpose=batch), targeting one supported endpoint (e.g., /v1/responses, /v1/chat/completions, /v1/embeddings, etc.) within a 24h completion window; returns a batch object with IDs, status, timestamps, counts, and optional usage.
  paths: []
  date: '2026-02-20'
  diff_url: https://github.com/gr2m/ai-provider-api-changes/pull/578
- change: added
  target: request
  breaking: false
  deprecated: false
  doc_only: false
  note: Added '/v1/videos' to the supported values of the request 'endpoint' enum.
  paths:
    - path: requestBody.content["application/json"].schema.properties.endpoint.enum[7]
      before: 'null'
      after: /v1/videos
  date: '2026-03-14'
- change: changed
  target: request
  breaking: false
  deprecated: false
  doc_only: true
  note: Updated the 'endpoint' description to include '/v1/videos' as a supported endpoint.
  paths:
    - path: requestBody.content["application/json"].schema.properties.endpoint.description
      before: The endpoint to be used for all requests in the batch. Currently `/v1/responses`, `/v1/chat/completions`, `/v1/embeddings`, `/v1/completions`, `/v1/moderations`, `/v1/images/generations`, and `/v1/images/edits` are supported. Note that `/v1/embeddings` batches are also restricted to a maximum of 50,000 embedding inputs across all requests in the batch.
      after: The endpoint to be used for all requests in the batch. Currently `/v1/responses`, `/v1/chat/completions`, `/v1/embeddings`, `/v1/completions`, `/v1/moderations`, `/v1/images/generations`, `/v1/images/edits`, and `/v1/videos` are supported. Note that `/v1/embeddings` batches are also restricted to a maximum of 50,000 embedding inputs across all requests in the batch.
  date: '2026-03-14'
