- change: added
  target: route
  breaking: false
  deprecated: false
  doc_only: false
  note: Added POST /threads to create a new thread. Supports optional initial messages, metadata, and tool_resources (code_interpreter file_ids or file_search vector stores). Returns a Thread object with id, created_at, metadata, and tool_resources.
  paths: []
  date: '2026-02-20'
  diff_url: https://github.com/gr2m/ai-provider-api-changes/pull/578
- change: changed
  target: request
  breaking: false
  deprecated: false
  doc_only: false
  note: In CreateThreadRequest.file_search.vector_stores[].file_ids, increased maxItems from 10,000 to 100,000,000.
  paths:
    - path: components.schemas.CreateThreadRequest.properties.tool_resources.anyOf[0].properties.file_search.properties.vector_stores.items.properties.file_ids.maxItems
      before: '10000'
      after: '100000000'
  date: '2026-03-05'
  diff_url: https://github.com/gr2m/ai-provider-monitor/pull/749
- change: changed
  target: request
  breaking: false
  deprecated: false
  doc_only: true
  note: Updated file_ids description to specify date-based limits (10,000 prior to Nov 2025; 100,000,000 starting Nov 2025).
  paths:
    - path: components.schemas.CreateThreadRequest.properties.tool_resources.anyOf[0].properties.file_search.properties.vector_stores.items.properties.file_ids.description
      before: |
        A list of [file](/docs/api-reference/files) IDs to add to the vector store. There can be a maximum of 10000 files in a vector store.
      after: |
        A list of [file](/docs/api-reference/files) IDs to add to the vector store. For vector stores created before Nov 2025, there can be a maximum of 10,000 files in a vector store. For vector stores created starting in Nov 2025, the limit is 100,000,000 files.
  date: '2026-03-05'
  diff_url: https://github.com/gr2m/ai-provider-monitor/pull/749
