- change: added
  target: route
  breaking: false
  deprecated: false
  doc_only: false
  note: Adds POST /threads/runs, allowing clients to create a new thread and immediately start a run with optional overrides (model, tools, response_format, truncation, token limits, streaming) and returns the Run object.
  paths: []
  date: '2026-02-20'
  diff_url: https://github.com/gr2m/ai-provider-api-changes/pull/578
- change: changed
  target: request
  breaking: false
  deprecated: false
  doc_only: false
  note: In CreateThreadRequest.thread.tool_resources.file_search.vector_stores.items.file_ids, the maxItems limit increased from 10,000 to 100,000,000 and the description was updated to clarify limits by vector store creation date.
  paths:
    - path: components/schemas/CreateThreadRequest/properties/tool_resources/anyOf/0/properties/file_search/properties/vector_stores/items/properties/file_ids/maxItems
      before: '10000'
      after: '100000000'
    - path: components/schemas/CreateThreadRequest/properties/tool_resources/anyOf/0/properties/file_search/properties/vector_stores/items/properties/file_ids/description
      before: |
        A list of [file](/docs/api-reference/files) IDs to add to the vector store. There can be a maximum of 10000 files in a vector store.
      after: |
        A list of [file](/docs/api-reference/files) IDs to add to the vector store. For vector stores created before Nov 2025, there can be a maximum of 10,000 files in a vector store. For vector stores created starting in Nov 2025, the limit is 100,000,000 files.
  date: '2026-03-05'
