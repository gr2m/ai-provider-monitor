- change: added
  target: route
  breaking: false
  deprecated: false
  doc_only: false
  note: Added POST /videos to create a new video generation job from a text prompt and optional input_reference via JSON or multipart; supports model, duration (4/8/12s), and resolution selection; returns a job object with status and progress.
  paths: []
  date: '2026-02-20'
  diff_url: https://github.com/gr2m/ai-provider-api-changes/pull/578
- change: added
  target: request
  breaking: false
  deprecated: false
  doc_only: false
  note: Added image_reference parameter for JSON-safe image refs (image_url or file_id).
  paths:
    - path: components.schemas.CreateVideoBody.properties.image_reference
      before: 'null'
      after: '{"$ref":"#/components/schemas/ImageRefParam-2","description":"Optional JSON-safe image reference that guides generation. Provide exactly one of `image_url` or `file_id`."}'
    - path: components.schemas.ImageRefParam-2
      before: 'null'
      after: '{"properties":{"file_id":{"example":"file-123","type":"string"},"image_url":{"description":"A fully qualified URL or base64-encoded data URL.","maxLength":20971520,"type":"string"}},"required":[],"type":"object"}'
  date: '2026-03-05'
- change: changed
  target: request
  breaking: false
  deprecated: false
  doc_only: true
  note: Updated description of input_reference to clarify it's a multipart reference asset.
  paths:
    - path: components.schemas.CreateVideoBody.properties.input_reference.description
      before: Optional image reference that guides generation.
      after: Optional multipart reference asset that guides generation.
  date: '2026-03-05'
- change: changed
  target: response
  breaking: true
  deprecated: false
  doc_only: false
  note: VideoResource.seconds no longer restricted to enum; now a generic string (may include stitched total).
  paths:
    - path: components.schemas.VideoResource.properties.seconds
      before: '{"$ref":"#/components/schemas/VideoSeconds","description":"Duration of the generated clip in seconds."}'
      after: '{"type":"string","description":"Duration of the generated clip in seconds. For extensions, this is the stitched total duration."}'
  date: '2026-03-05'
