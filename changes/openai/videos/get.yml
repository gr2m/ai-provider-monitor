- change: added
  target: route
  breaking: false
  deprecated: false
  doc_only: false
  note: 'Introduces GET /videos to list recently generated videos for the current project. Supports optional query params: limit (max 100), order (asc|desc), and after (cursor) for pagination. Returns a list object of video job metadata (status, progress, timestamps, model, size, seconds) with pagination fields.'
  paths: []
  date: '2026-02-20'
  diff_url: https://github.com/gr2m/ai-provider-api-changes/pull/578
- change: changed
  target: response
  breaking: true
  deprecated: false
  doc_only: false
  note: VideoResource.seconds changed from enum reference to a free-form string; description updated.
  paths:
    - path: components/schemas/VideoResource/properties/seconds/$ref
      before: '#/components/schemas/VideoSeconds'
      after: 'null'
    - path: components/schemas/VideoResource/properties/seconds/type
      before: 'null'
      after: string
    - path: components/schemas/VideoResource/properties/seconds/description
      before: Duration of the generated clip in seconds.
      after: Duration of the generated clip in seconds. For extensions, this is the stitched total duration.
  date: '2026-03-05'
- change: removed
  target: response
  breaking: false
  deprecated: false
  doc_only: false
  note: Removed VideoSeconds schema (no longer referenced).
  paths:
    - path: components/schemas/VideoSeconds
      before: '{"enum":["4","8","12"],"type":"string"}'
      after: 'null'
  date: '2026-03-05'
