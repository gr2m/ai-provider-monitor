- change: added
  target: route
  breaking: false
  deprecated: false
  doc_only: false
  note: Adds POST /vector_stores/{vector_store_id}/files to attach an existing File (file_id) to a vector store, with optional attributes and chunking_strategy; returns the vector_store.file object.
  paths: []
  date: '2026-02-20'
