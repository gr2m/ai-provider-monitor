- change: added
  target: route
  breaking: false
  deprecated: false
  doc_only: true
  note: Added route-level description noting a 300 RPM per-vector-store write rate limit and suggesting file_batches for multi-file uploads.
  paths:
    - path: $.description
      before: 'null'
      after: |-
        This endpoint is subject to a per-vector-store write rate limit of 300 requests per minute, shared with `/vector_stores/{vector_store_id}/file_batches`.
        For uploading multiple files to the same vector store, use the file batches endpoint to reduce request volume.
  date: '2026-03-26'
- change: changed
  target: request
  breaking: false
  deprecated: false
  doc_only: true
  note: Updated description of file_id to recommend using file_batches for multi-file ingestion to reduce write requests.
  paths:
    - path: $.components.schemas.CreateVectorStoreFileRequest.properties.file_id.description
      before: A [File](/docs/api-reference/files) ID that the vector store should use. Useful for tools like `file_search` that can access files.
      after: A [File](/docs/api-reference/files) ID that the vector store should use. Useful for tools like `file_search` that can access files. For multi-file ingestion, we recommend [`file_batches`](/docs/api-reference/vector-stores-file-batches/createBatch) to minimize per-vector-store write requests.
  date: '2026-03-26'
