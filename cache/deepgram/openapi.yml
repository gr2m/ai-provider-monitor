    AgentConfigurationV1:
      description: A reusable agent configuration
      properties:
        agent_id:
          description: The unique identifier of the agent configuration
          type: string
        config:
          $ref: "#/components/schemas/AgentConfigurationV1Config"
          description: The agent configuration object
        created_at:
          description: Timestamp when the configuration was created
          format: date-time
          type: string
        metadata:
          additionalProperties:
            type: string
          description: A map of arbitrary key-value pairs for labeling or organizing the agent configuration
          type: object
        updated_at:
          description: Timestamp when the configuration was last updated
          format: date-time
          type: string
      required:
        - agent_id
        - config
